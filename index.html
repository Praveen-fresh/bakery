<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CK's Bakery POS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap");

:root {
  --ground: #1c1a17;
  --panel: #24211d;
  --panel-raised: #2c2822;
  --hairline: #3c372f;
  --text: #f3ede1;
  --text-dim: #b6ac9a;
  --gold: #e8a73c;
  --gold-dim: #7a5b23;
  --pink: #e85d8a;
  --pink-dim: #7a3049;
  --danger: #e2504f;
  --danger-bg: #3a2320;
  --ok: #7fb069;
  --font-display: "Fraunces", serif;
  --font-body: "Inter", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--ground); color: var(--text); font-family: var(--font-body); }
button, input, select, textarea { font-family: inherit; }

.billing-screen { max-width: 1160px; margin: 0 auto; padding: 28px 24px 60px; }
.billing-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; border-bottom: 1px solid var(--hairline); padding-bottom: 18px; }
.billing-header h1 { font-family: var(--font-display); font-weight: 600; font-size: 28px; margin: 0 0 4px; letter-spacing: 0.2px; }
.billing-outlet { margin: 0; color: var(--text-dim); font-size: 14px; }
.billing-body { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
@media (max-width: 860px) { .billing-body { grid-template-columns: 1fr; } }

.item-category { margin-bottom: 28px; }
.item-category-title { font-family: var(--font-display); font-weight: 500; color: var(--gold); margin: 0 0 12px; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.item-card { background: var(--panel); border: 1px solid var(--hairline); border-radius: 10px; padding: 16px 14px; text-align: left; color: var(--text); cursor: pointer; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.15s ease, transform 0.1s ease; }
.item-card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }
.item-card-name { font-size: 14px; font-weight: 500; }
.item-card-price { font-family: var(--font-mono); color: var(--gold); font-size: 14px; }

.cart-panel { background: var(--panel); border: 1px solid var(--hairline); border-radius: 12px; padding: 18px; position: sticky; top: 24px; display: flex; flex-direction: column; min-height: 320px; }
.cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cart-header h2 { font-family: var(--font-display); font-size: 18px; margin: 0; }
.cart-empty { color: var(--text-dim); font-size: 13px; line-height: 1.6; }
.cart-lines { list-style: none; margin: 0; padding: 0; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.cart-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; border-bottom: 1px solid var(--hairline); padding-bottom: 10px; }
.cart-line-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.cart-line-name { font-size: 13.5px; }
.cart-line-sub { font-size: 12px; color: var(--text-dim); }
.cart-line-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cart-line-price { font-family: var(--font-mono); font-size: 13px; color: var(--gold); }
.cart-line-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; }
.cart-line-remove:hover { color: var(--danger); }
.cart-warning { background: var(--danger-bg); border: 1px solid var(--danger); border-radius: 8px; padding: 10px 12px; font-size: 12.5px; margin-top: 12px; }
.cart-warning ul { margin: 6px 0 0; padding-left: 18px; }
.cart-footer { margin-top: 16px; border-top: 1px solid var(--hairline); padding-top: 14px; }
.cart-total-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 12px; }
.cart-total { font-family: var(--font-mono); color: var(--gold); font-weight: 500; }

.btn { border: 1px solid transparent; border-radius: 8px; padding: 10px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; }
.btn-block { width: 100%; }
.btn-primary { background: var(--gold); color: #241c0a; }
.btn-primary:hover { filter: brightness(1.05); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--pink-dim); color: var(--pink); border-color: var(--pink-dim); }
.btn-secondary:hover { border-color: var(--pink); }
.btn-ghost { background: transparent; border-color: var(--hairline); color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

.modal-overlay { position: fixed; inset: 0; background: rgba(10, 9, 7, 0.65); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.modal { background: var(--panel-raised); border: 1px solid var(--hairline); border-radius: 12px; width: 100%; max-width: 440px; max-height: 88vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--hairline); }
.modal-header h2 { font-family: var(--font-display); font-size: 18px; margin: 0; }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12.5px; color: var(--text-dim); }
.field select, .field input, .field textarea { background: var(--panel); border: 1px solid var(--hairline); border-radius: 7px; color: var(--text); padding: 9px 10px; font-size: 13.5px; }
.field select:focus, .field input:focus, .field textarea:focus { outline: 2px solid var(--gold-dim); outline-offset: 1px; }
.cake-recipe-meta { font-size: 12px; color: var(--text-dim); }
.cake-recipe-meta code { font-family: var(--font-mono); color: var(--pink); }
.cake-price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--hairline); padding-top: 12px; font-size: 14px; }
.cake-price { font-family: var(--font-mono); color: var(--gold); font-size: 18px; }
.modal-footer { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--hairline); }
.modal-footer .btn { flex: 1; }

.receipt-id { font-family: var(--font-mono); color: var(--text-dim); font-size: 12.5px; margin: 0 0 12px; }
.receipt-lines { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.receipt-line { display: flex; justify-content: space-between; font-size: 13.5px; }
.receipt-total-row { display: flex; justify-content: space-between; border-top: 1px dashed var(--hairline); margin-top: 8px; padding-top: 12px; font-size: 16px; font-family: var(--font-mono); color: var(--gold); }

.stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stock-table th { text-align: left; color: var(--text-dim); font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.4px; padding-bottom: 8px; border-bottom: 1px solid var(--hairline); }
.stock-table td { padding: 8px 0; border-bottom: 1px solid var(--hairline); font-family: var(--font-mono); font-size: 12.5px; }
.stock-table td:first-child { font-family: var(--font-body); }
.stock-badge { font-family: var(--font-body); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; }
.stock-badge-ok { background: rgba(127, 176, 105, 0.18); color: var(--ok); }
.stock-badge-watch { background: rgba(232, 167, 60, 0.18); color: var(--gold); }
.stock-badge-low { background: rgba(226, 80, 79, 0.18); color: var(--danger); }

.low-stock-banner { position: sticky; top: 0; z-index: 40; background: var(--danger-bg); border-bottom: 1px solid var(--danger); color: var(--text); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
.low-stock-dismiss { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useContext, createContext, useCallback, useMemo } = React;

/* ---------- data/sampleMenu ---------- */

const outlets = [{ id: "madipakkam-main", name: "CK's Bakery — Madipakkam" }];

const menuItems = [
  { id: "bread-white", name: "White bread loaf", category: "Bakery", price: 55, stockIngredientId: "stock-bread-white" },
  { id: "bun-milk", name: "Milk bun (pack of 6)", category: "Bakery", price: 60, stockIngredientId: "stock-bun-milk" },
  { id: "puff-veg", name: "Vegetable puff", category: "Snacks", price: 25, stockIngredientId: "stock-puff-veg" },
  { id: "cookie-choc", name: "Chocolate chip cookie", category: "Snacks", price: 20, stockIngredientId: "stock-cookie-choc" },
  { id: "cake-slice-black-forest", name: "Black Forest slice", category: "Cakes", price: 90, stockIngredientId: "stock-slice-blackforest" },
];

const cakeRecipes = [
  {
    id: "recipe-vanilla-cream",
    name: "Vanilla cream custom cake",
    currentVersion: "v2",
    versions: {
      v1: {
        version: "v1", effectiveFrom: "2025-11-01", costPerKg: 420, markupMultiplier: 1.6,
        ingredients: [
          { ingredientId: "ing-flour", name: "Flour", qtyPerKg: 0.32, unit: "kg" },
          { ingredientId: "ing-sugar", name: "Sugar", qtyPerKg: 0.22, unit: "kg" },
          { ingredientId: "ing-butter", name: "Butter", qtyPerKg: 0.18, unit: "kg" },
          { ingredientId: "ing-cream", name: "Fresh cream", qtyPerKg: 0.28, unit: "kg" },
          { ingredientId: "ing-vanilla", name: "Vanilla essence", qtyPerKg: 0.01, unit: "l" },
        ],
      },
      v2: {
        version: "v2", effectiveFrom: "2026-05-15", costPerKg: 460, markupMultiplier: 1.6,
        note: "Cream ratio increased for a softer finish; supplier price update.",
        ingredients: [
          { ingredientId: "ing-flour", name: "Flour", qtyPerKg: 0.30, unit: "kg" },
          { ingredientId: "ing-sugar", name: "Sugar", qtyPerKg: 0.20, unit: "kg" },
          { ingredientId: "ing-butter", name: "Butter", qtyPerKg: 0.18, unit: "kg" },
          { ingredientId: "ing-cream", name: "Fresh cream", qtyPerKg: 0.34, unit: "kg" },
          { ingredientId: "ing-vanilla", name: "Vanilla essence", qtyPerKg: 0.012, unit: "l" },
        ],
      },
    },
    flavors: ["Vanilla", "Vanilla & strawberry swirl", "Vanilla & choc-chip"],
  },
  {
    id: "recipe-chocolate-truffle",
    name: "Chocolate truffle custom cake",
    currentVersion: "v1",
    versions: {
      v1: {
        version: "v1", effectiveFrom: "2026-01-10", costPerKg: 520, markupMultiplier: 1.55,
        ingredients: [
          { ingredientId: "ing-flour", name: "Flour", qtyPerKg: 0.28, unit: "kg" },
          { ingredientId: "ing-cocoa", name: "Cocoa powder", qtyPerKg: 0.10, unit: "kg" },
          { ingredientId: "ing-choc-compound", name: "Chocolate compound", qtyPerKg: 0.35, unit: "kg" },
          { ingredientId: "ing-butter", name: "Butter", qtyPerKg: 0.16, unit: "kg" },
          { ingredientId: "ing-cream", name: "Fresh cream", qtyPerKg: 0.20, unit: "kg" },
        ],
      },
    },
    flavors: ["Dark chocolate", "Milk chocolate truffle"],
  },
];

const initialOutletStock = {
  "madipakkam-main": {
    "stock-bread-white": { name: "White bread loaf", stock: 40, unit: "loaf", reorderLevel: 10 },
    "stock-bun-milk": { name: "Milk bun (pack of 6)", stock: 25, unit: "pack", reorderLevel: 8 },
    "stock-puff-veg": { name: "Vegetable puff", stock: 60, unit: "pc", reorderLevel: 15 },
    "stock-cookie-choc": { name: "Chocolate chip cookie", stock: 90, unit: "pc", reorderLevel: 20 },
    "stock-slice-blackforest": { name: "Black Forest slice", stock: 12, unit: "pc", reorderLevel: 4 },
    "ing-flour": { name: "Flour", stock: 3, unit: "kg", reorderLevel: 5 },
    "ing-sugar": { name: "Sugar", stock: 8, unit: "kg", reorderLevel: 3 },
    "ing-butter": { name: "Butter", stock: 6, unit: "kg", reorderLevel: 2 },
    "ing-cream": { name: "Fresh cream", stock: 4, unit: "kg", reorderLevel: 2 },
    "ing-vanilla": { name: "Vanilla essence", stock: 1.5, unit: "l", reorderLevel: 0.5 },
    "ing-cocoa": { name: "Cocoa powder", stock: 2, unit: "kg", reorderLevel: 1 },
    "ing-choc-compound": { name: "Chocolate compound", stock: 5, unit: "kg", reorderLevel: 2 },
  },
};

/* ---------- utils/format ---------- */

function formatINR(amount) {
  return new Intl.NumberFormat("en-IN", { style: "currency", currency: "INR", maximumFractionDigits: 2 }).format(amount);
}
function formatQty(qty, unit) {
  const rounded = Math.round(qty * 1000) / 1000;
  return `${rounded} ${unit}`.trim();
}
function round(n) { return Math.round(n * 1000) / 1000; }

/* ---------- services/orderService (local simulation, mirrors functions/index.js) ---------- */

function findMenuItem(menuItemId) { return menuItems.find((m) => m.id === menuItemId); }
function findRecipeVersion(recipeId, versionId) {
  const recipe = cakeRecipes.find((r) => r.id === recipeId);
  return recipe && recipe.versions[versionId];
}

function resolveLine(line) {
  if (line.type === "standard") {
    const item = findMenuItem(line.menuItemId);
    return {
      type: "standard", menuItemId: line.menuItemId, name: item.name, qty: line.qty,
      unitPrice: item.price, lineTotal: item.price * line.qty,
      ingredientRequirements: [{ ingredientId: item.stockIngredientId, qty: line.qty }],
    };
  }
  const recipe = findRecipeVersion(line.recipeId, line.recipeVersion);
  const lineTotal = round(recipe.costPerKg * line.weightKg * (recipe.markupMultiplier ?? 1));
  return {
    type: "customCake", recipeId: line.recipeId, recipeVersion: line.recipeVersion, name: line.name,
    flavor: line.flavor, designNotes: line.designNotes ?? "", weightKg: line.weightKg,
    unitPrice: lineTotal, lineTotal,
    ingredientRequirements: recipe.ingredients.map((ing) => ({ ingredientId: ing.ingredientId, qty: round(ing.qtyPerKg * line.weightKg) })),
  };
}

// Mirrors the Cloud Function transaction: resolve -> check stock -> deduct + log -> reorder check
function processOrder({ stockState, lines }) {
  const resolvedLines = lines.map(resolveLine);

  const requirementByIngredient = new Map();
  for (const line of resolvedLines) {
    for (const req of line.ingredientRequirements) {
      requirementByIngredient.set(req.ingredientId, (requirementByIngredient.get(req.ingredientId) || 0) + req.qty);
    }
  }

  const insufficient = [];
  for (const [ingredientId, qtyNeeded] of requirementByIngredient) {
    const available = stockState[ingredientId] ? stockState[ingredientId].stock : 0;
    if (available < qtyNeeded) {
      insufficient.push({ ingredientId, name: stockState[ingredientId] ? stockState[ingredientId].name : ingredientId, needed: qtyNeeded, available });
    }
  }
  if (insufficient.length > 0) return { status: "insufficient_stock", insufficient };

  const stockPatch = {};
  const movements = [];
  const lowStockAlerts = [];
  for (const [ingredientId, qtyNeeded] of requirementByIngredient) {
    const current = stockState[ingredientId];
    const newStock = round(current.stock - qtyNeeded);
    stockPatch[ingredientId] = { ...current, stock: newStock };
    movements.push({ ingredientId, name: current.name, qty: -qtyNeeded, stockAfter: newStock, at: new Date().toISOString() });
    if (current.reorderLevel > 0 && newStock <= current.reorderLevel) {
      lowStockAlerts.push({ ingredientId, name: current.name, stock: newStock, reorderLevel: current.reorderLevel });
    }
  }

  const total = resolvedLines.reduce((sum, l) => sum + l.lineTotal, 0);
  const order = { id: `local-${Date.now()}`, lines: resolvedLines, total, createdAt: new Date().toISOString() };
  return { status: "success", order, stockPatch, movements, lowStockAlerts };
}

/* ---------- context/OutletContext ---------- */

const OutletContext = createContext(null);

function OutletProvider({ children }) {
  const [outletId] = useState(outlets[0].id);
  const [stock, setStock] = useState(initialOutletStock[outletId]);
  const [movements, setMovements] = useState([]);

  function applyOrderResult({ stockPatch, movements: newMovements }) {
    setStock((prev) => ({ ...prev, ...stockPatch }));
    setMovements((prev) => [...newMovements, ...prev]);
  }

  const outlet = outlets.find((o) => o.id === outletId);
  return (
    <OutletContext.Provider value={{ outlet, outletId, stock, movements, applyOrderResult }}>
      {children}
    </OutletContext.Provider>
  );
}
function useOutlet() {
  const ctx = useContext(OutletContext);
  if (!ctx) throw new Error("useOutlet must be used within OutletProvider");
  return ctx;
}

/* ---------- context/CartContext ---------- */

const CartContext = createContext(null);

function CartProvider({ children }) {
  const { outletId, stock, applyOrderResult } = useOutlet();
  const [lines, setLines] = useState([]);
  const [status, setStatus] = useState("idle");
  const [insufficientItems, setInsufficientItems] = useState([]);
  const [lastBill, setLastBill] = useState(null);
  const [lowStockAlerts, setLowStockAlerts] = useState([]);

  const addStandardItem = useCallback((menuItem) => {
    setLines((prev) => {
      const existing = prev.find((l) => l.type === "standard" && l.menuItemId === menuItem.id);
      if (existing) return prev.map((l) => (l === existing ? { ...l, qty: l.qty + 1 } : l));
      return [...prev, { type: "standard", menuItemId: menuItem.id, name: menuItem.name, qty: 1, unitPrice: menuItem.price }];
    });
  }, []);

  const addCustomCake = useCallback((cakeLine) => {
    setLines((prev) => [...prev, { type: "customCake", ...cakeLine }]);
  }, []);

  const removeLine = useCallback((index) => {
    setLines((prev) => prev.filter((_, i) => i !== index));
  }, []);

  const checkout = useCallback(async () => {
    if (lines.length === 0) return;
    setStatus("processing");
    setTimeout(() => {
      const result = processOrder({ outletId, lines, stockState: stock });
      if (result.status === "insufficient_stock") {
        setStatus("insufficient");
        setInsufficientItems(result.insufficient);
        return;
      }
      applyOrderResult(result);
      setLastBill(result.order);
      setLowStockAlerts(result.lowStockAlerts || []);
      setLines([]);
      setStatus("idle");
    }, 300);
  }, [lines, outletId, stock, applyOrderResult]);

  const total = lines.reduce((sum, l) => sum + (l.type === "standard" ? l.unitPrice * l.qty : l.unitPrice), 0);

  return (
    <CartContext.Provider value={{
      lines, total, status, insufficientItems, lastBill, lowStockAlerts,
      addStandardItem, addCustomCake, removeLine, checkout,
      dismissBill: () => setLastBill(null),
      dismissAlerts: () => setLowStockAlerts([]),
    }}>
      {children}
    </CartContext.Provider>
  );
}
function useCart() {
  const ctx = useContext(CartContext);
  if (!ctx) throw new Error("useCart must be used within CartProvider");
  return ctx;
}

/* ---------- components/stock ---------- */

function StockStatusBadge({ stock, reorderLevel }) {
  const level = stock <= reorderLevel ? "low" : stock <= reorderLevel * 2 ? "watch" : "ok";
  const label = { low: "Low", watch: "Watch", ok: "OK" }[level];
  return <span className={`stock-badge stock-badge-${level}`}>{label}</span>;
}

function StockPanel({ onClose }) {
  const { stock } = useOutlet();
  const rows = Object.entries(stock).sort(([, a], [, b]) => a.name.localeCompare(b.name));
  return (
    <div className="modal-overlay" role="dialog" aria-modal="true">
      <div className="modal">
        <div className="modal-header">
          <h2>Outlet stock</h2>
          <button className="modal-close" onClick={onClose} aria-label="Close">&times;</button>
        </div>
        <div className="modal-body">
          <table className="stock-table">
            <thead>
              <tr><th>Ingredient / item</th><th>Stock</th><th>Reorder at</th><th></th></tr>
            </thead>
            <tbody>
              {rows.map(([id, s]) => (
                <tr key={id}>
                  <td>{s.name}</td>
                  <td>{formatQty(s.stock, s.unit)}</td>
                  <td>{formatQty(s.reorderLevel, s.unit)}</td>
                  <td><StockStatusBadge stock={s.stock} reorderLevel={s.reorderLevel} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="modal-footer">
          <button className="btn btn-primary btn-block" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function LowStockAlert() {
  const { lowStockAlerts, dismissAlerts } = useCart();
  if (lowStockAlerts.length === 0) return null;
  return (
    <div className="low-stock-banner" role="alert">
      <div>
        <strong>Low stock:</strong>{" "}
        {lowStockAlerts.map((a) => `${a.name} (${formatQty(a.stock, "")} left, reorder at ${a.reorderLevel})`).join(" · ")}
      </div>
      <button className="low-stock-dismiss" onClick={dismissAlerts} aria-label="Dismiss">&times;</button>
    </div>
  );
}

/* ---------- components/billing ---------- */

function CustomCakeModal({ onClose }) {
  const { addCustomCake } = useCart();
  const [recipeId, setRecipeId] = useState(cakeRecipes[0].id);
  const [weightKg, setWeightKg] = useState(1);
  const [flavor, setFlavor] = useState(cakeRecipes[0].flavors[0]);
  const [designNotes, setDesignNotes] = useState("");

  const recipe = cakeRecipes.find((r) => r.id === recipeId);
  const version = recipe.versions[recipe.currentVersion];
  const price = useMemo(() => round(version.costPerKg * weightKg * (version.markupMultiplier ?? 1)), [version, weightKg]);

  function handleRecipeChange(id) {
    const next = cakeRecipes.find((r) => r.id === id);
    setRecipeId(id);
    setFlavor(next.flavors[0]);
  }

  function handleAdd() {
    addCustomCake({ recipeId, recipeVersion: recipe.currentVersion, name: recipe.name, flavor, designNotes, weightKg, unitPrice: price });
    onClose();
  }

  return (
    <div className="modal-overlay" role="dialog" aria-modal="true">
      <div className="modal">
        <div className="modal-header">
          <h2>Custom cake order</h2>
          <button className="modal-close" onClick={onClose} aria-label="Close">&times;</button>
        </div>
        <div className="modal-body">
          <label className="field">
            <span className="field-label">Cake type</span>
            <select value={recipeId} onChange={(e) => handleRecipeChange(e.target.value)}>
              {cakeRecipes.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </label>
          <label className="field">
            <span className="field-label">Flavor</span>
            <select value={flavor} onChange={(e) => setFlavor(e.target.value)}>
              {recipe.flavors.map((f) => <option key={f} value={f}>{f}</option>)}
            </select>
          </label>
          <label className="field">
            <span className="field-label">Weight (kg)</span>
            <input type="number" min="0.5" step="0.5" value={weightKg}
              onChange={(e) => setWeightKg(Math.max(0.5, Number(e.target.value)))} />
          </label>
          <label className="field">
            <span className="field-label">Design notes</span>
            <textarea rows="3" placeholder="e.g. Happy birthday Meera, blue piping, edible pearls"
              value={designNotes} onChange={(e) => setDesignNotes(e.target.value)} />
          </label>
          <div className="cake-recipe-meta">
            Recipe version <code>{version.version}</code>, effective {version.effectiveFrom}
          </div>
          <div className="cake-price-row">
            <span>Price</span>
            <span className="cake-price">{formatINR(price)}</span>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleAdd}>Add to bill</button>
        </div>
      </div>
    </div>
  );
}

function ItemGrid() {
  const { addStandardItem } = useCart();
  const categories = [...new Set(menuItems.map((m) => m.category))];
  return (
    <div>
      {categories.map((category) => (
        <section key={category} className="item-category">
          <h3 className="item-category-title">{category}</h3>
          <div className="item-grid">
            {menuItems.filter((m) => m.category === category).map((item) => (
              <button key={item.id} className="item-card" onClick={() => addStandardItem(item)}>
                <span className="item-card-name">{item.name}</span>
                <span className="item-card-price">{formatINR(item.price)}</span>
              </button>
            ))}
          </div>
        </section>
      ))}
    </div>
  );
}

function CartPanel() {
  const { lines, total, status, insufficientItems, removeLine, checkout } = useCart();
  const [showCakeModal, setShowCakeModal] = useState(false);

  return (
    <aside className="cart-panel">
      <div className="cart-header">
        <h2>Current order</h2>
        <button className="btn btn-secondary" onClick={() => setShowCakeModal(true)}>+ Custom cake</button>
      </div>

      {lines.length === 0 ? (
        <p className="cart-empty">Tap an item, or add a custom cake, to start a bill.</p>
      ) : (
        <ul className="cart-lines">
          {lines.map((line, i) => (
            <li key={i} className="cart-line">
              <div className="cart-line-main">
                <span className="cart-line-name">
                  {line.type === "standard" ? `${line.qty} × ${line.name}` : `${line.name} (${line.weightKg} kg)`}
                </span>
                {line.type === "customCake" && (
                  <span className="cart-line-sub">{line.flavor}{line.designNotes ? ` — ${line.designNotes}` : ""}</span>
                )}
              </div>
              <div className="cart-line-right">
                <span className="cart-line-price">
                  {formatINR(line.type === "standard" ? line.unitPrice * line.qty : line.unitPrice)}
                </span>
                <button className="cart-line-remove" onClick={() => removeLine(i)} aria-label="Remove line">&times;</button>
              </div>
            </li>
          ))}
        </ul>
      )}

      {status === "insufficient" && (
        <div className="cart-warning">
          <strong>Can't complete this sale — stock is short:</strong>
          <ul>
            {insufficientItems.map((item) => (
              <li key={item.ingredientId}>{item.name}: need {item.needed}, have {item.available}</li>
            ))}
          </ul>
        </div>
      )}

      <div className="cart-footer">
        <div className="cart-total-row">
          <span>Total</span>
          <span className="cart-total">{formatINR(total)}</span>
        </div>
        <button className="btn btn-primary btn-block" disabled={lines.length === 0 || status === "processing"} onClick={checkout}>
          {status === "processing" ? "Processing…" : "Checkout & print bill"}
        </button>
      </div>

      {showCakeModal && <CustomCakeModal onClose={() => setShowCakeModal(false)} />}
    </aside>
  );
}

function BillingScreen() {
  const { outlet } = useOutlet();
  const [showStock, setShowStock] = useState(false);
  return (
    <div className="billing-screen">
      <header className="billing-header">
        <div>
          <h1>CK's Bakery POS</h1>
          <p className="billing-outlet">{outlet.name}</p>
        </div>
        <button className="btn btn-ghost" onClick={() => setShowStock(true)}>View stock</button>
      </header>
      {showStock && <StockPanel onClose={() => setShowStock(false)} />}
      <div className="billing-body">
        <ItemGrid />
        <CartPanel />
      </div>
    </div>
  );
}

/* ---------- components/bill ---------- */

function BillReceipt() {
  const { lastBill, dismissBill } = useCart();
  if (!lastBill) return null;
  return (
    <div className="modal-overlay" role="dialog" aria-modal="true">
      <div className="modal receipt">
        <div className="modal-header">
          <h2>Bill generated</h2>
          <button className="modal-close" onClick={dismissBill} aria-label="Close">&times;</button>
        </div>
        <div className="modal-body">
          <p className="receipt-id">Order #{lastBill.id}</p>
          <ul className="receipt-lines">
            {lastBill.lines.map((line, i) => (
              <li key={i} className="receipt-line">
                <span>{line.type === "standard" ? `${line.qty} × ${line.name}` : `${line.name} (${line.weightKg} kg, ${line.flavor})`}</span>
                <span>{formatINR(line.lineTotal)}</span>
              </li>
            ))}
          </ul>
          <div className="receipt-total-row">
            <span>Total</span>
            <span>{formatINR(lastBill.total)}</span>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-primary btn-block" onClick={dismissBill}>Done</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- App ---------- */

function App() {
  return (
    <OutletProvider>
      <CartProvider>
        <LowStockAlert />
        <BillingScreen />
        <BillReceipt />
      </CartProvider>
    </OutletProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
